name: Tests and Lint

on: [push, pull_request]

jobs:
  test_lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Run tests
      run: npm test
    - name: Run lint
      run: npm run lint
